<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Face Login System - Secure facial recognition authentication powered by AI">
    <title>{% block title %}FaceLogin{% endblock %} | Face Authentication System</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- Animated Background Particles -->
    <div class="bg-particles" id="bg-particles"></div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark glass-nav fixed-top">
        <div class="container">
            <a class="navbar-brand brand-logo" href="{% url 'home_page' %}">
                <i class="bi bi-shield-lock-fill"></i>
                <span>FaceLogin</span>
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navContent">
                <ul class="navbar-nav ms-auto gap-2">
                    <li class="nav-item">
                        <a class="nav-link px-3" href="{% url 'home_page' %}">
                            <i class="bi bi-house-fill me-1"></i> Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3" href="{% url 'register_page' %}">
                            <i class="bi bi-person-plus-fill me-1"></i> Register
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link btn-nav-login px-4" href="{% url 'login_page' %}">
                            <i class="bi bi-box-arrow-in-right me-1"></i> Login
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Toast Container -->
    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 9999;" id="toast-container"></div>

    <!-- Main Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="glass-footer text-center py-4 mt-5">
        <div class="container">
            <p class="mb-0 text-secondary">
                <i class="bi bi-shield-check me-1"></i>
                FaceLogin &copy; 2026 &mdash; Powered by AI Face Recognition
            </p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Toast Utility -->
    <script>
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const icons = {
                success: 'bi-check-circle-fill',
                danger: 'bi-exclamation-triangle-fill',
                warning: 'bi-exclamation-circle-fill',
                info: 'bi-info-circle-fill'
            };
            const colors = {
                success: '#22c55e',
                danger: '#ef4444',
                warning: '#f59e0b',
                info: '#38bdf8'
            };

            const toast = document.createElement('div');
            toast.className = 'toast show glass-toast';
            toast.setAttribute('role', 'alert');
            toast.innerHTML = `
                <div class="toast-body d-flex align-items-center gap-2" style="color: ${colors[type]}">
                    <i class="bi ${icons[type]} fs-5"></i>
                    <span>${message}</span>
                    <button type="button" class="btn-close btn-close-white ms-auto" onclick="this.closest('.toast').remove()"></button>
                </div>
            `;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }
    </script>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
