services:
  db:
    image: pgvector/pgvector:pg16
    container_name: facelogin-db
    environment:
      POSTGRES_DB: facelogin
      POSTGRES_USER: facelogin
      POSTGRES_PASSWORD: facelogin_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: unless-stopped

  web:
    build: .
    container_name: facelogin-web
    ports:
      - "8000:8000"
    volumes:
      - ./media:/app/media
    environment:
      - DEBUG=1
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
      - DJANGO_SECRET_KEY=dev-secret-key-change-in-production-!@#$%
      - DATABASE_URL=postgres://facelogin:facelogin_secret@db:5432/facelogin
    depends_on:
      - db
    restart: unless-stopped

volumes:
  pgdata:
